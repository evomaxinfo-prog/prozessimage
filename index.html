<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProModXgOEM – Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-blue:#0065A5;
    --brand-blue-dark:#004E80;
    --brand-blue-soft:#E6F0F7;
    --brand-gray:#939598;
    --tenant-red:#CB2B2B;
    --bg:#FFFFFF;
    --panel:#F6F8FA;
    --panel-2:#EDF1F5;
    --border:#E1E7ED;
    --border-strong:#C9D2DA;
    --text:#1E2A33;
    --muted:#6C7A85;
    --font-sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    --l1:#0065A5;
    --l2:#7A3FA8;
    --l3:#0E8A6E;
    --l4:#D9822B;
    --l5:#C0392B;
    --header-h:52px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-sans);
    color:var(--text);
    background:var(--bg);
    font-size:14px;
    line-height:1.45;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--font-mono)}

  /* ---------- Header ---------- */
  header{
    height:var(--header-h);
    display:flex;align-items:center;
    border-bottom:1px solid var(--border);
    padding:0 18px;gap:14px;
    background:var(--bg);
    position:relative;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand svg{display:block}
  .brand-name{font-weight:600;letter-spacing:.3px;font-size:15px}
  .brand-name b{color:var(--brand-blue)}
  .brand .ver{font-family:var(--font-mono);font-size:11px;color:var(--muted);
    border:1px solid var(--border);border-radius:3px;padding:1px 5px;margin-left:2px}
  .tenant{
    position:absolute;left:50%;transform:translateX(-50%);
    color:var(--tenant-red);font-weight:700;letter-spacing:2px;font-size:13px;
    display:flex;align-items:center;gap:7px;
  }
  .tenant .dot{width:7px;height:7px;border-radius:50%;background:var(--tenant-red);
    box-shadow:0 0 0 3px rgba(203,43,43,.15)}
  .head-right{margin-left:auto;display:flex;align-items:center;gap:4px}
  .icon-btn{
    width:34px;height:34px;border:none;background:none;border-radius:6px;
    color:var(--muted);display:grid;place-items:center;transition:.15s;
  }
  .icon-btn:hover{background:var(--panel-2);color:var(--brand-blue)}
  .user-chip{
    display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;
    background:var(--panel);border:1px solid var(--border);margin-left:6px;
  }
  .avatar{width:26px;height:26px;border-radius:50%;background:var(--brand-blue);
    color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}
  .user-chip span{font-size:12.5px;font-weight:500}

  /* ---------- App shell ---------- */
  .app{display:flex;height:calc(100vh - var(--header-h))}
  aside.tree{
    width:262px;flex-shrink:0;border-right:1px solid var(--border);
    background:var(--bg);display:flex;flex-direction:column;
  }
  .tree-head{padding:13px 16px 9px;display:flex;align-items:center;justify-content:space-between}
  .tree-head h2{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .tree-scroll{flex:1;overflow-y:auto;padding:2px 8px 8px}
  .tree-foot{padding:10px 12px;border-top:1px solid var(--border)}
  .btn-add{
    width:100%;border:1px dashed var(--border-strong);background:var(--panel);
    color:var(--brand-blue);border-radius:7px;padding:9px;font-size:11.5px;font-weight:600;
    letter-spacing:.6px;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;
  }
  .btn-add:hover{background:var(--brand-blue-soft);border-color:var(--brand-blue)}

  /* tree nodes */
  .node{user-select:none}
  .row{
    display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:6px;
    cursor:pointer;position:relative;font-size:13px;transition:background .12s;
  }
  .row:hover{background:var(--panel)}
  .row.active{background:var(--brand-blue-soft);color:var(--brand-blue-dark)}
  .row.active .n-name{font-weight:600}
  .toggle{width:16px;height:16px;flex-shrink:0;display:grid;place-items:center;color:var(--muted)}
  .toggle svg{transition:transform .18s}
  .node.open>.row>.toggle svg{transform:rotate(90deg)}
  .toggle.leaf{visibility:hidden}
  .n-icon{width:17px;height:17px;flex-shrink:0;color:var(--brand-gray);display:grid;place-items:center}
  .row.active .n-icon{color:var(--brand-blue)}
  .n-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .node-tools{margin-left:auto;display:flex;gap:1px;opacity:0;transition:opacity .12s;flex-shrink:0}
  .row:hover .node-tools{opacity:1}
  .node-tools button{width:24px;height:24px;border:none;background:none;border-radius:5px;color:var(--muted);display:grid;place-items:center;cursor:pointer}
  .node-tools button:hover{background:var(--panel-2);color:var(--brand-blue)}
  .node-tools button.del:hover{background:#fdecea;color:var(--tenant-red)}
  .n-edit{flex:1;min-width:0;border:none;border-bottom:1.5px solid var(--brand-blue);background:none;
    font:inherit;font-size:13px;color:var(--text);padding:1px 0;outline:none}
  .node-confirm{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tenant-red);flex-shrink:0}
  .node-confirm button{border:none;border-radius:5px;font:inherit;font-size:11px;font-weight:600;padding:2px 9px;cursor:pointer}
  .node-confirm .yes{background:var(--tenant-red);color:#fff}
  .node-confirm .no{background:var(--panel-2);color:var(--text)}
  .children{margin-left:11px;border-left:1px solid var(--border);padding-left:5px;
    overflow:hidden;max-height:0;transition:max-height .2s ease}
  .node.open>.children{max-height:6000px}

  /* ---------- Content ---------- */
  main.content{flex:1;overflow-y:auto;background:var(--panel);position:relative}
  .breadcrumb{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    padding:12px 26px;background:var(--bg);border-bottom:1px solid var(--border);
    font-size:12px;color:var(--muted);position:sticky;top:0;z-index:5;
  }
  .breadcrumb b{color:var(--text)}
  .breadcrumb .crumb{color:var(--muted)}
  .breadcrumb .crumb.last{color:var(--brand-blue);font-weight:600}
  .breadcrumb .sep{color:var(--border-strong)}

  .pad{padding:22px 26px 60px}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:18px;overflow:hidden}
  .card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .card-head h3{font-size:13px;font-weight:600;letter-spacing:.2px}
  .card-head .badge{font-family:var(--font-mono);font-size:10px;color:var(--muted);
    background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1px 6px}
  .card-body{padding:18px}

  /* detail hero */
  .detail-top{display:grid;grid-template-columns:280px 1fr;gap:22px;margin-bottom:18px}
  .preview{
    border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;
    aspect-ratio:4/3;position:relative;cursor:pointer;transition:.15s;
  }
  .preview:hover{border-color:var(--brand-blue);box-shadow:0 4px 18px rgba(0,101,165,.10)}
  .preview .tag{position:absolute;left:10px;bottom:10px;background:rgba(30,42,51,.82);color:#fff;
    font-size:10px;font-family:var(--font-mono);padding:3px 8px;border-radius:4px;backdrop-filter:blur(2px)}
  .preview .open-hint{position:absolute;top:10px;right:10px;background:var(--brand-blue);color:#fff;
    font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;opacity:0;transition:.15s}
  .preview:hover .open-hint{opacity:1}
  .detail-title{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
  .detail-title h1{font-size:22px;font-weight:600;letter-spacing:-.2px}
  .detail-title .sub{color:var(--muted);font-size:13px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0 4px}
  .chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel-2);
    color:var(--text);display:flex;align-items:center;gap:5px}
  .chip.blue{background:var(--brand-blue-soft);color:var(--brand-blue-dark)}

  /* form grid */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 34px}
  .fld{padding:9px 0;border-bottom:1px solid var(--border)}
  .fld label{display:block;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:600}
  .fld .val{font-size:13.5px;min-height:20px}
  .fld input,.fld textarea{
    width:100%;border:none;border-bottom:1.5px solid transparent;background:none;font:inherit;
    font-size:13.5px;color:var(--text);padding:0;outline:none;
  }
  .fld.editing{border-bottom-color:var(--brand-blue)}
  .fld.editing input,.fld.editing textarea{cursor:text}
  .fld input:disabled,.fld textarea:disabled{color:var(--text);opacity:1}
  .fld.wide{grid-column:1/-1}
  .fld .auto{font-family:var(--font-mono);font-size:11px;color:var(--brand-gray)}

  /* journal */
  .journal-list{display:flex;flex-direction:column;gap:0}
  .j-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);position:relative}
  .j-item:last-child{border-bottom:none}
  .j-dot{width:8px;height:8px;border-radius:50%;background:var(--brand-blue);margin-top:6px;flex-shrink:0}
  .j-body{flex:1}
  .j-text{font-size:13px}
  .j-meta{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);margin-top:2px}
  .j-add{display:flex;gap:8px;margin-top:14px}
  .j-add input{flex:1;border:1px solid var(--border);border-radius:7px;padding:8px 11px;font:inherit;font-size:13px;outline:none}
  .j-add input:focus{border-color:var(--brand-blue)}
  .j-add button{width:38px;border-radius:7px;border:none;background:var(--brand-blue);color:#fff;display:grid;place-items:center;transition:.15s}
  .j-add button:hover{background:var(--brand-blue-dark)}

  /* SPS table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);
    font-weight:600;padding:0 12px 9px;border-bottom:1px solid var(--border)}
  thead th.num{text-align:right}
  tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  tbody td.num{text-align:right;font-family:var(--font-mono);font-size:12.5px}
  tbody tr:last-child td{border-bottom:none}
  .sps-name{font-weight:600;display:flex;align-items:center;gap:9px}
  .sps-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .row-act{display:flex;gap:2px;justify-content:flex-end}
  .mini-btn{width:28px;height:28px;border:none;background:none;border-radius:5px;color:var(--muted);display:grid;place-items:center;transition:.12s}
  .mini-btn:hover{background:var(--panel-2);color:var(--brand-blue)}
  .mini-btn.del:hover{background:#fdecea;color:var(--tenant-red)}
  .add-row-btn{margin-top:12px;border:1px dashed var(--border-strong);background:none;color:var(--brand-blue);
    border-radius:7px;padding:8px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .add-row-btn:hover{background:var(--brand-blue-soft)}

  /* action bar */
  .action-bar{display:flex;gap:10px;margin-bottom:20px}
  .btn{
    border:1px solid var(--border-strong);background:var(--bg);color:var(--text);
    border-radius:8px;padding:10px 20px;font-size:12.5px;font-weight:600;letter-spacing:.6px;
    display:inline-flex;align-items:center;gap:8px;transition:.15s;
  }
  .btn:hover{border-color:var(--brand-blue);color:var(--brand-blue)}
  .btn.primary{background:var(--brand-blue);border-color:var(--brand-blue);color:#fff}
  .btn.primary:hover{background:var(--brand-blue-dark);color:#fff}
  .btn.solid-dark{background:var(--text);border-color:var(--text);color:#fff}
  .btn.solid-dark:hover{background:#2f3d48;color:#fff}

  /* Werk overview */
  .werk-wrap{padding:22px 26px 60px}
  .werk-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px}
  .werk-head h1{font-size:24px;font-weight:600}
  .werk-head p{color:var(--muted);font-size:13px;margin-top:2px}
  .zone-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat .k{font-family:var(--font-mono);font-size:26px;font-weight:600;letter-spacing:-1px}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .stat.b .k{color:var(--brand-blue)}

  /* ---------- Editor ---------- */
  .editor-wrap{display:flex;height:100%;background:var(--panel)}
  .canvas-col{flex:1;display:flex;flex-direction:column;min-width:0}
  .editor-topbar{
    display:flex;align-items:center;gap:12px;padding:10px 18px;background:var(--bg);
    border-bottom:1px solid var(--border);
  }
  .editor-topbar .ttl{font-weight:600;font-size:14px;display:flex;align-items:center;gap:9px}
  .editor-topbar .ttl .lyr-badge{font-family:var(--font-mono);font-size:10px;color:#fff;padding:2px 7px;border-radius:4px}
  .zoom-ctl{margin-left:auto;display:flex;align-items:center;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:2px}
  .zoom-ctl button{width:28px;height:26px;border:none;background:none;border-radius:5px;color:var(--muted);font-size:16px;display:grid;place-items:center}
  .zoom-ctl button:hover{background:var(--bg);color:var(--brand-blue)}
  .zoom-ctl .z{font-family:var(--font-mono);font-size:11px;color:var(--muted);width:44px;text-align:center}

  .canvas-stage{flex:1;position:relative;overflow:hidden;background:
    radial-gradient(circle at 30% 20%, #fbfcfd, #eef2f6)}
  .canvas-inner{position:absolute;inset:0;display:grid;place-items:center;padding:26px}
  .canvas-doc{position:relative;width:100%;max-width:820px;aspect-ratio:760/520;transition:transform .12s;
    box-shadow:0 6px 26px rgba(30,42,51,.10)}
  .canvas-doc .floor-bg{position:absolute;inset:0;width:100%;height:100%;transition:opacity .15s}
  .floor-photo{object-fit:contain;background:#fff;border:1px solid var(--border)}
  .symbol-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .floor-symbols{pointer-events:none}
  .layout-badge{position:absolute;left:10px;top:10px;font-family:var(--font-mono);font-size:10px;
    background:rgba(0,101,165,.92);color:#fff;padding:3px 8px;border-radius:4px;letter-spacing:.3px}
  .layout-badge.muted{background:rgba(30,42,51,.55)}
  .up-btn{border:1px solid var(--border-strong);background:var(--bg);color:var(--text);border-radius:8px;
    padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:.5px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
  .up-btn:hover{border-color:var(--brand-blue);color:var(--brand-blue)}
  .preview-upload{position:absolute;left:10px;top:10px;z-index:2;border:none;background:rgba(255,255,255,.94);
    color:var(--brand-blue);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(30,42,51,.14);transition:.15s}
  .preview-upload:hover{background:#fff}
  .preview img{width:100%;height:100%;object-fit:cover;display:block}
  .canvas-doc.drop-hi{outline:2px dashed var(--brand-blue);outline-offset:4px}
  .placed-layer{position:absolute;inset:0;pointer-events:none}
  .placed{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:grab;
    display:flex;flex-direction:column;align-items:center;z-index:3;touch-action:none;-webkit-user-select:none;user-select:none}
  .placed:active{cursor:grabbing}
  .placed .p-sym{width:38px;height:38px;display:grid;place-items:center;background:#fff;
    border:1.8px solid currentColor;border-radius:9px;box-shadow:0 2px 8px rgba(30,42,51,.16);
    transition:box-shadow .12s,transform .12s}
  .placed:hover .p-sym{box-shadow:0 5px 15px rgba(30,42,51,.24);transform:translateY(-1px)}
  .ptags{display:flex;flex-direction:column;gap:4px;margin-top:7px;align-items:center;animation:tagsIn .15s ease}
  @keyframes tagsIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .ptag{font-family:var(--font-mono);font-size:10px;color:var(--text);background:#fff;
    border:1px solid var(--border);border-left:3px solid currentColor;border-radius:5px;
    padding:2px 8px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    box-shadow:0 2px 6px rgba(30,42,51,.13)}

  /* Metatag-Dialog */
  .modal-backdrop{position:fixed;inset:0;z-index:250;background:rgba(20,32,42,.42);
    display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);animation:mIn .15s ease}
  @keyframes mIn{from{opacity:0}to{opacity:1}}
  .modal-card{background:#fff;border:1px solid var(--border);border-radius:14px;width:390px;max-width:100%;
    box-shadow:0 24px 64px rgba(20,40,60,.24);overflow:hidden;animation:mUp .18s ease}
  @keyframes mUp{from{transform:translateY(10px);opacity:.5}to{transform:none;opacity:1}}
  .modal-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border)}
  .modal-sym{width:40px;height:40px;flex-shrink:0;display:grid;place-items:center;background:#fff;border:1.8px solid currentColor;border-radius:10px}
  .modal-title{font-size:15px;font-weight:600}
  .modal-sub{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);margin-top:1px}
  .modal-x{margin-left:auto;width:32px;height:32px;border:none;background:none;border-radius:7px;color:var(--muted);font-size:22px;line-height:1;display:grid;place-items:center}
  .modal-x:hover{background:var(--panel-2);color:var(--text)}
  .modal-body{padding:18px}
  .m-field{margin-bottom:14px}
  .m-field:last-child{margin-bottom:0}
  .m-field label{display:block;font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
  .m-field input{width:100%;border:1px solid var(--border-strong);border-radius:8px;padding:9px 11px;font:inherit;font-size:14px;outline:none;transition:border-color .15s}
  .m-field input:focus{border-color:var(--brand-blue)}
  .modal-foot{display:flex;align-items:center;gap:8px;padding:14px 18px;border-top:1px solid var(--border);background:var(--panel)}
  .del-btn{color:var(--tenant-red);border-color:transparent;background:none;padding:8px 10px}
  .del-btn:hover{background:#fdecea;border-color:transparent;color:var(--tenant-red)}

  .palette{
    position:absolute;top:16px;left:16px;background:rgba(255,255,255,.96);border:1px solid var(--border);
    border-radius:10px;padding:11px;box-shadow:0 6px 22px rgba(30,42,51,.09);backdrop-filter:blur(4px);width:186px;
  }
  .palette h4{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:9px}
  .pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .pal-item{
    display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border:1px solid var(--border);
    border-radius:7px;background:var(--bg);cursor:grab;transition:.12s;text-align:center;
  }
  .pal-item:hover{border-color:var(--brand-blue);background:var(--brand-blue-soft);transform:translateY(-1px)}
  .pal-item .sym{width:24px;height:24px;display:grid;place-items:center}
  .pal-item span{font-size:9.5px;line-height:1.1;color:var(--muted)}

  .sat-ctl{
    position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.96);border:1px solid var(--border);
    border-radius:10px;padding:10px 14px;box-shadow:0 6px 22px rgba(30,42,51,.09);width:200px;
  }
  .sat-ctl label{font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;justify-content:space-between}
  .sat-ctl label span{font-family:var(--font-mono);color:var(--brand-blue)}
  input[type=range]{width:100%;margin-top:8px;accent-color:var(--brand-blue)}

  .exp-ctl{
    position:absolute;bottom:16px;right:16px;display:flex;gap:8px;
  }

/* ---------------- State ---------------- */
let state = {selected:null, view:'welcome', edit:false, expanded:new Set(['w1','c1','a1','k1','l1']),
  activeLayer:'L1.0', layerVis:{'L1.0':true,'L2.0':true,'L3.0':true,'L4.0':true,'L5.0':true},
  zoom:1, sat:65, editingNodeId:null, confirmDelete:null};

function findNode(id,nodes=TREE){
  for(const n of nodes){ if(n.id===id) return n; if(n.children){const f=findNode(id,n.children); if(f) return f;} }
  return null;
}
function pathTo(id,nodes=TREE,trail=[]){
  for(const n of nodes){
    const t=[...trail,n];
    if(n.id===id) return t;
    if(n.children){const f=pathTo(id,n.children,t); if(f) return f;}
  }
  return null;
}

/* ---------------- Tree ---------------- */
function renderTree(){
  document.getElementById('treeScroll').innerHTML = TREE.map(n=>nodeHTML(n)).join('');
}
function nodeHTML(n){
  const open = state.expanded.has(n.id);
  const hasKids = n.children && n.children.length;
  const active = state.selected===n.id;
  const editing = state.editingNodeId===n.id;
  const confirming = state.confirmDelete===n.id;
  const child = nextType(n.type);
  let right;
  if(editing){
    right = `<input class="n-edit" value="${esc(n.name)}" onclick="event.stopPropagation()"
        onkeydown="onRenameKey(event,'${n.id}')" onblur="commitRename('${n.id}',this.value)">`;
  } else if(confirming){
    right = `<div class="node-confirm" onclick="event.stopPropagation()">
        <span>Löschen?</span>
        <button class="yes" onclick="confirmDeleteNode('${n.id}',event)">Ja</button>
        <button class="no" onclick="cancelDelete(event)">Nein</button>
      </div>`;
  } else {
    right = `<div class="node-tools">
        ${child?`<button title="${child} hinzufügen" onclick="addChild('${n.id}',event)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></button>`:''}
        <button title="Umbenennen" onclick="startRename('${n.id}',event)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20h4L18 10l-4-4L4 16z"/></svg></button>
        <button class="del" title="Löschen" onclick="askDelete('${n.id}',event)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13"/></svg></button>
      </div>`;
  }
  return `<div class="node ${open?'open':''}" data-id="${n.id}">
    <div class="row ${active?'active':''}" onclick="onNode('${n.id}',event)">
      <div class="toggle ${hasKids?'':'leaf'}" onclick="onToggle('${n.id}',event)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
      </div>
      <div class="n-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">${ICONS[n.type]}</svg></div>
      ${editing?'':`<div class="n-name">${esc(n.name)}</div>`}
      ${right}
    </div>
    ${hasKids?`<div class="children">${n.children.map(c=>nodeHTML(c)).join('')}</div>`:''}
  </div>`;
}

/* ---- Baum bearbeiten: hinzufügen / umbenennen / löschen ---- */
const TYPE_ORDER=['Werk','Center','Abteilung','KST','Linie','Anlage'];
function nextType(t){ const i=TYPE_ORDER.indexOf(t); return (i>=0 && i<TYPE_ORDER.length-1)?TYPE_ORDER[i+1]:null; }
let nodeSeq=0;
function newNodeId(){ return 'n'+Date.now().toString(36)+(++nodeSeq); }
function locate(id, list=TREE, parent=null){
  for(let i=0;i<list.length;i++){
    if(list[i].id===id) return {parent, list, index:i, node:list[i]};
    if(list[i].children){ const r=locate(id, list[i].children, list[i]); if(r) return r; }
  }
  return null;
}
function focusEdit(id){ setTimeout(()=>{ const el=document.querySelector(`.node[data-id="${id}"] > .row .n-edit`); if(el){ el.focus(); el.select(); } },30); }

function addWerk(){
  const id=newNodeId();
  TREE.push({id, type:'Werk', name:'Neues Werk', children:[]});
  state.editingNodeId=id; state.confirmDelete=null;
  renderTree(); focusEdit(id);
}
function addChild(parentId,e){ e.stopPropagation();
  const p=findNode(parentId); const ct=nextType(p.type); if(!ct) return;
  if(!p.children) p.children=[];
  const id=newNodeId();
  p.children.push({id, type:ct, name:`Neue ${ct}`, children: nextType(ct)?[]:undefined});
  state.expanded.add(parentId); state.editingNodeId=id; state.confirmDelete=null;
  renderTree(); focusEdit(id);
}
function startRename(id,e){ e.stopPropagation(); state.editingNodeId=id; state.confirmDelete=null; renderTree(); focusEdit(id); }
function onRenameKey(e,id){
  if(e.key==='Enter'){ e.preventDefault(); commitRename(id, e.target.value); }
  else if(e.key==='Escape'){ state.editingNodeId=null; renderTree(); }
}
function commitRename(id,val){
  if(state.editingNodeId!==id) return;
  const n=findNode(id); const v=(val||'').trim();
  if(n && v) n.name=v;
  state.editingNodeId=null; renderTree();
  if(state.selected===id) renderContent();
}
function askDelete(id,e){ e.stopPropagation(); state.confirmDelete=id; state.editingNodeId=null; renderTree(); }
function cancelDelete(e){ e.stopPropagation(); state.confirmDelete=null; renderTree(); }
function confirmDeleteNode(id,e){ e.stopPropagation();
  const loc=locate(id); if(loc) loc.list.splice(loc.index,1);
  state.confirmDelete=null;
  if(state.selected && !findNode(state.selected)){ state.selected=null; state.view='welcome'; }
  renderTree(); renderContent(); toast('Gelöscht');
}
function onToggle(id,e){ e.stopPropagation();
  if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
  renderTree();
}
function onNode(id,e){ e.stopPropagation();
  const n=findNode(id); state.selected=id; state.edit=false;
  if(n.type==='Werk'){ state.view='werk'; state.expanded=new Set([id]); }
  else if(n.type==='Anlage'){ state.view='detail'; }
  else { if(!state.expanded.has(id)) state.expanded.add(id); else state.expanded.delete(id); }
  renderTree(); renderContent();
}

/* ---------------- Content router ---------------- */
function renderContent(){
  const el=document.getElementById('content');
  if(state.view==='welcome'){ el.innerHTML=welcomeHTML(); return; }
  if(state.view==='werk'){ el.innerHTML=werkHTML(findNode(state.selected)); return; }
  if(state.view==='detail'){ el.innerHTML=detailHTML(state.selected); return; }
  if(state.view==='editor'){ renderEditor(el); return; }
}

/* ---------------- Layout-Bild-Upload ---------------- */
let layoutImages = {};   // Anlagen-ID -> Data-URL (In-Memory, Mockup)
function layoutImg(id){ return layoutImages[id] || (STATIONS[id] && STATIONS[id].layoutBild) || null; }
function triggerUpload(){ document.getElementById('layoutFile').click(); }
function onLayoutFile(e){
  const f = e.target.files && e.target.files[0]; e.target.value='';
  if(!f) return;
  if(!f.type.startsWith('image/')){ toast('Bitte eine Bilddatei wählen'); return; }
  if(f.size > 8*1024*1024){ toast('Bild zu groß (max. 8 MB)'); return; }
  if(!state.selected){ toast('Bitte zuerst eine Anlage wählen'); return; }
  const r = new FileReader();
  r.onload = () => { layoutImages[state.selected] = r.result; toast('Layout hochgeladen'); renderContent(); };
  r.readAsDataURL(f);
}

/* ---------------- Platzieren (Drag & Drop) + Metatags ---------------- */
let placedObjects = {};   // Anlagen-ID -> [{id,kind,name,color,x,y,tags,showTags}]
let placedSeq = 0;
function placedList(id){ return placedObjects[id] || (placedObjects[id]=[]); }

function onPalDragStart(e, kind, name, color){
  e.dataTransfer.setData('text/plain', JSON.stringify({kind, name, color}));
  e.dataTransfer.effectAllowed = 'copy';
}
function onPalDragEnd(){ const d=document.getElementById('canvasDoc'); if(d)d.classList.remove('drop-hi'); }

function onCanvasDrop(e){
  e.preventDefault();
  const doc=document.getElementById('canvasDoc'); if(doc)doc.classList.remove('drop-hi');
  let data; try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(_){ return; }
  if(!data || !state.selected || !doc) return;
  const r=doc.getBoundingClientRect();
  const x=Math.max(3,Math.min(97,(e.clientX-r.left)/r.width*100));
  const y=Math.max(4,Math.min(96,(e.clientY-r.top)/r.height*100));
  const list=placedList(state.selected);
  const base=(data.name||'Objekt').replace(/\s+/g,'_');
  const num=String(list.filter(o=>o.kind===data.kind).length+1).padStart(2,'0');
  const L=LAYERS.find(l=>l.id===state.activeLayer);
  list.push({id:'o'+(++placedSeq), kind:data.kind, name:`${base}_${num}`, color:data.color||L.color,
    layerId:state.activeLayer, x, y, tags:['','']});
  toast(`${data.name} platziert`);
  renderContent();
}

/* Freies Verschieben platzierter Symbole (Pointer-Drag) */
let dragMove=null;
function startMove(e, oid){
  if(e.button!==undefined && e.button!==0) return;
  const doc=document.getElementById('canvasDoc'); if(!doc) return;
  dragMove={oid, el:e.currentTarget, sx:e.clientX, sy:e.clientY, moved:false, doc, nx:null, ny:null};
}
function onMove(e){
  if(!dragMove) return;
  if(!dragMove.moved && Math.hypot(e.clientX-dragMove.sx, e.clientY-dragMove.sy)<4) return;
  dragMove.moved=true;
  const r=dragMove.doc.getBoundingClientRect();
  const x=Math.max(3,Math.min(97,(e.clientX-r.left)/r.width*100));
  const y=Math.max(4,Math.min(96,(e.clientY-r.top)/r.height*100));
  dragMove.nx=x; dragMove.ny=y;
  dragMove.el.style.left=x+'%'; dragMove.el.style.top=y+'%'; dragMove.el.style.cursor='grabbing';
}
function endMove(){
  if(!dragMove) return;
  if(dragMove.moved && dragMove.nx!=null){
    const o=placedList(state.selected).find(x=>x.id===dragMove.oid);
    if(o){ o.x=dragMove.nx; o.y=dragMove.ny; }
  }
  if(dragMove.el) dragMove.el.style.cursor='';
  dragMove=null;
}

const AUTH = {email:'alexander.roth@evomax.de', pass:'evomax2026', loggedIn:false};

function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function togglePw(id,btn){ const i=document.getElementById(id); const show=i.type==='password';
  i.type=show?'text':'password'; btn.classList.toggle('on',show); }

function showPanel(which){
  document.getElementById('panelLogin').style.display  = which==='login' ?'block':'none';
  document.getElementById('panelChange').style.display = which==='change'?'block':'none';
  document.getElementById('loginMsg').textContent='';
  const cm=document.getElementById('chgMsg'); cm.textContent=''; cm.classList.remove('ok');
  if(which==='change'){
    const e=document.getElementById('loginEmail').value.trim();
    if(e) document.getElementById('chgEmail').value=e;
    setTimeout(()=>document.getElementById('chgEmail').focus(),50);
  } else {
    setTimeout(()=>document.getElementById('loginEmail').focus(),50);
  }
}

function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const msg=document.getElementById('loginMsg');
  if(!isEmail(email)){ msg.textContent='Bitte eine gültige E-Mail-Adresse eingeben.'; return; }
  if(email.toLowerCase()!==AUTH.email.toLowerCase() || pass!==AUTH.pass){
    msg.textContent='E-Mail oder Passwort ist nicht korrekt.'; return; }
  msg.textContent=''; enterApp(email);
}

function enterApp(email){
  AUTH.loggedIn=true;
  document.getElementById('userName').textContent=email;
  const initials=(email.split('@')[0].split(/[.\-_]/).filter(Boolean).slice(0,2)
    .map(s=>s[0].toUpperCase()).join('')) || 'U';
  document.getElementById('userAvatar').textContent=initials;
  const ls=document.getElementById('loginScreen'); ls.classList.add('hide');
  setTimeout(()=>ls.style.display='none',300);
}

function logout(){
  AUTH.loggedIn=false;
  const ls=document.getElementById('loginScreen');
  ls.style.display='flex'; requestAnimationFrame(()=>ls.classList.remove('hide'));
  document.getElementById('loginPass').value='';
  showPanel('login');
}

function pwScore(v){ let s=0;
  if(v.length>=8)s++; if(/[a-z]/.test(v)&&/[A-Z]/.test(v))s++; if(/\d/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  return Math.min(s,4); }
function updateStrength(){
  const s=pwScore(document.getElementById('chgNew').value);
  const col=['','#C0392B','#D9822B','#0E8A6E','#0E8A6E'][s];
  document.querySelectorAll('#pwBars i').forEach((b,i)=>{ b.style.background = i<s ? col : 'var(--panel-2)'; });
}

function doChange(){
  const email=document.getElementById('chgEmail').value.trim();
  const oldp=document.getElementById('chgOld').value;
  const np=document.getElementById('chgNew').value;
  const np2=document.getElementById('chgNew2').value;
  const msg=document.getElementById('chgMsg'); msg.classList.remove('ok');
  if(!isEmail(email)){ msg.textContent='Bitte eine gültige E-Mail-Adresse eingeben.'; return; }
  if(email.toLowerCase()!==AUTH.email.toLowerCase() || oldp!==AUTH.pass){
    msg.textContent='E-Mail oder aktuelles Passwort ist nicht korrekt.'; return; }
  if(np.length<8){ msg.textContent='Das neue Passwort muss mindestens 8 Zeichen haben.'; return; }
  if(np===oldp){ msg.textContent='Das neue Passwort muss sich vom aktuellen unterscheiden.'; return; }
  if(np!==np2){ msg.textContent='Die neuen Passwörter stimmen nicht überein.'; return; }
  AUTH.pass=np;
  msg.classList.add('ok'); msg.textContent='Passwort geändert. Bitte neu anmelden.';
  ['chgOld','chgNew','chgNew2'].forEach(id=>document.getElementById(id).value='');
  updateStrength();
  setTimeout(()=>{ showPanel('login');
    document.getElementById('loginEmail').value=email;
    document.getElementById('loginPass').value='';
    document.getElementById('loginPass').focus();
  },1300);
}

/* ---------------- Init ---------------- */
document.getElementById('layoutFile').addEventListener('change', onLayoutFile);
document.addEventListener('pointermove', onMove);
document.addEventListener('pointerup', endMove);
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeTagModal(); if(state.confirmDelete){ state.confirmDelete=null; renderTree(); } } });
document.getElementById('tagModal').addEventListener('click', e=>{ if(e.target.id==='tagModal') closeTagModal(); });
renderTree(); renderContent();
showPanel('login');
</script>
