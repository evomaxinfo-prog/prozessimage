<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://api.prozessimage.de; connect-src 'self' https://api.prozessimage.de; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>ProModXgOEM</title>
<link rel="stylesheet" href="css/app.css?v=0.24.46">
<script defer src="js/api.js?v=0.24.46"></script>
<script defer src="js/app.js?v=0.24.46"></script>
</head>
<body>

<!-- Geteilte SVG-Maske: Roboter-Icon wird über die Maske mit currentColor (Ebenenfarbe) eingefärbt -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <mask id="robotMask" maskUnits="userSpaceOnUse" x="0" y="0" width="24" height="24">
    <image href="img/robot-mask.png?v=0.24.46" x="0" y="0" width="24" height="24" preserveAspectRatio="xMidYMid meet"/>
  </mask>
</defs></svg>

<!-- ================= LOGIN ================= -->
<div class="login-screen" id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-brand">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <path d="M17 3 L30 9.5 L17 16 L4 9.5 Z" fill="#0065A5"/>
        <path d="M17 12.5 L30 19 L17 25.5 L4 19 Z" fill="#3d8bc0"/>
        <path d="M17 22 L30 28.5 L17 35 L4 28.5 Z" fill="#939598"/>
      </svg>
      <div>
        <div class="lb-name">ProMod<b>X</b>gOEM</div>
        <div class="lb-sub">Anlagendokumentation · <span class="ver">v0.24.46</span></div>
      </div>
    </div>
    <div class="login-tenant"><span class="dot"></span>UMGEBUNG: TEST</div>

    <!-- Panel: Anmelden -->
    <div id="panelLogin">
      <h1 class="login-h">Anmelden</h1>
      <form id="loginForm" autocomplete="on">
      <div class="login-field">
        <label>Benutzer · E-Mail</label>
        <input id="loginEmail" name="username" type="email" placeholder="name@evomax.de" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Passwort</label>
        <div class="pw-wrap">
          <input id="loginPass" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-eye" data-toggle="loginPass" title="Passwort anzeigen">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="login-msg" id="loginMsg"></div>
      <button class="login-btn" id="btnLogin" type="submit">ANMELDEN</button>
      </form>
      <div class="login-links">
        <button class="link" data-panel="change">Passwort ändern</button>
      </div>
    </div>

    <!-- Panel: Passwort ändern -->
    <div id="panelChange" style="display:none">
      <h1 class="login-h">Passwort ändern</h1>
      <div class="login-field">
        <label>Benutzer · E-Mail</label>
        <input id="chgEmail" type="email" placeholder="name@evomax.de" autocomplete="username">
      </div>
      <div class="login-field">
        <label>Aktuelles Passwort</label>
        <div class="pw-wrap">
          <input id="chgOld" type="password" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-eye" data-toggle="chgOld" title="Passwort anzeigen">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="login-field">
        <label>Neues Passwort</label>
        <div class="pw-wrap">
          <input id="chgNew" type="password" placeholder="mind. 8 Zeichen" autocomplete="new-password">
          <button class="pw-eye" data-toggle="chgNew" title="Passwort anzeigen">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pwBars"><i></i><i></i><i></i><i></i></div>
      </div>
      <div class="login-field">
        <label>Neues Passwort bestätigen</label>
        <div class="pw-wrap">
          <input id="chgNew2" type="password" placeholder="••••••••" autocomplete="new-password">
          <button class="pw-eye" data-toggle="chgNew2" title="Passwort anzeigen">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="login-msg" id="chgMsg"></div>
      <button class="login-btn" id="btnChange">PASSWORT SPEICHERN</button>
      <div class="login-links">
        <button class="link" data-panel="login">‹ Zurück zur Anmeldung</button>
      </div>
    </div>
  </div>
  <div class="login-foot">evomax GmbH · evolution and a maximum of efficiency for our clients</div>
</div>

<!-- ================= HEADER ================= -->
<header>
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M13 2 L23 7 L13 12 L3 7 Z" fill="#0065A5"/>
      <path d="M13 9 L23 14 L13 19 L3 14 Z" fill="#3d8bc0"/>
      <path d="M13 16 L23 21 L13 26 L3 21 Z" fill="#939598"/>
    </svg>
    <div class="brand-name">ProMod<b>X</b>gOEM</div>
    <span class="ver">v0.24.46</span>
  </div>
  <div class="tenant"><span class="dot"></span><span id="tenantName">TEST</span></div>
  <div class="head-right">
    <button class="icon-btn" id="btnAdmin" title="Benutzerverwaltung" style="display:none">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"/><path d="M16 5.5a3 3 0 0 1 0 5.7M18 20c0-2.4-1-4.3-2.6-5.3"/></svg>
    </button>
    <button class="icon-btn" title="Kontaktkarte / Profil">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M5.5 16c.4-1.5 1.6-2.3 3-2.3s2.6.8 3 2.3M14 9.5h4M14 13h3"/></svg>
    </button>
    <div class="user-chip">
      <div class="avatar" id="userAvatar">–</div>
      <span id="userName">…</span>
    </div>
    <button class="icon-btn" title="Abmelden" id="btnLogout">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/><path d="M10 12H3M6 8l-4 4 4 4"/></svg>
    </button>
  </div>
</header>

<!-- ================= APP ================= -->
<div class="app">
  <aside class="tree">
    <div class="tree-head"><h2>Anlagenstruktur</h2>
      <div class="tree-head-actions">
        <button id="btnExpandAll" title="Alles aufklappen" aria-label="Alles aufklappen"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="btnCollapseAll" title="Alles zuklappen" aria-label="Alles zuklappen"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14"/></svg></button>
      </div>
    </div>
    <div class="tree-scroll" id="treeScroll"></div>
    <div class="tree-foot">
      <button class="btn-add" id="btnAddWerk">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        PROJEKT HINZUFÜGEN
      </button>
    </div>
  </aside>
  <main class="content" id="content"></main>
</div>

<div class="toast" id="toast"><span class="tdot"></span><span id="toastMsg"></span></div>

<input type="file" id="layoutFile" accept="image/*" style="display:none">
<div class="modal-backdrop" id="tagModal" style="display:none">
  <div class="modal-card">
    <div class="modal-head">
      <span class="modal-sym" id="mSym"></span>
      <div><div class="modal-title" id="mTitle">Objekt</div><div class="modal-sub" id="mSub"></div></div>
      <button class="modal-x" id="mX" title="Schließen">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot">
      <button class="btn del-btn" id="mDelete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13"/></svg>
        Löschen
      </button>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" id="mClose">Abbrechen</button>
        <button class="btn primary" id="mSave">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div id="adminOverlay"></div>

</body>
</html>
